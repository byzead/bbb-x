    <main class="container my-5">
        <h2 class="mb-4">Get in Touch</h2>
        <div class="row">
            <div class="col-md-7">
                <form id="contactForm" action="">
                    <div class="mb-3">
                        <label for="name" class="form-label">Name</label>
                        <input type="text" class="form-control" id="name" placeholder="Your Name" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" placeholder="Your Email" required>
                    </div>
                    <div class="mb-3">
                        <label for="eventType" class="form-label">Event Type</label>
                        <select class="form-select" id="eventType" required>
                            <option value="" disabled selected>Select an event type</option>
                            <option value="wedding">Wedding</option>
                            <option value="corporate">Corporate Event</option>
                            <option value="birthday">Birthday Party</option>
                            <option value="other">Other</option>
                        </select>
                    </div> 
                    <div class="mb-3">
                        <label for="message" class="form-label">Message</label>
                        <textarea class="form-control" id="message" rows="5" placeholder="Your Message" required></textarea>
                    </div> 

                    <button type="submit" class="btn btn-primary">Submit</button>
                </form>
            </div>
            <div class="col-md-5">
                <h5>Contact Information</h5>
                <p><i class="fa-solid fa-phone"></i> +1 234 567 890</p>
                <p><i class="fa-solid fa-envelope"></i> info@delishcatering.com</p>
                <p><i class="fa-solid fa-map-pin"></i> Parker More, Rangpur</p>
        </div>


        <div class="container text-end mt-4">
    <p class="text-muted">
        <i class="fa-regular fa-clock"></i>
        <span id="liveDateTimeContact"></span>
    </p>
 </div>
